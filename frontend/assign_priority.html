<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Priority - Infra Flow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <h2>Infra Flow</h2>
        <div class="nav-links">
            <a href="admin_dashboard.html">Dashboard</a>
            <a href="assign_technician.html">Assign Tasks</a>
            <a href="update_status.html">Update Status</a>
            <a href="login.html" class="btn-nav">Logout</a>
        </div>
    </nav>
    <div class="page-container">
        <div class="card">
            <h2>Assign Priority</h2>
            <p class="subtitle">Set the urgency level for a reported issue</p>
            <form onsubmit="alert('Priority Assigned Successfully!'); window.location.href='admin_dashboard.html'; return false;">
                <div class="form-group">
                    <label>Select Open Issue</label>
                    <select required>
                        <option value="" disabled selected>Choose an issue...</option>
                        <option value="101">#101 - WiFi down in Building A</option>
                        <option value="104">#104 - Server core dump error</option>
                        <option value="105">#105 - Projector screen stuck</option>
                        <option value="107">#107 - Desktop monitor flicker</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority Level</label>
                    <select required>
                        <option value="" disabled selected>Select priority...</option>
                        <option value="Critical">Critical</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px; background: #111827;">Save Priority</button>
            </form>
        </div>
    </div>
</body>
</html>
