<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - Infra Flow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <h2>Infra Flow</h2>
        <div class="nav-links">
            <a href="front.html">Home</a>
            <a href="view_issues.html">Issues</a>
            <a href="login.html" class="btn-nav">Logout</a>
        </div>
    </nav>
    <div class="page-container">
        <div class="card">
            <h2>Report an Issue</h2>
            <p class="subtitle">Provide details about the infrastructure issue</p>
            <form>
                <div class="form-group">
                    <label>Issue Title</label>
                    <input type="text" placeholder="e.g. WiFi down in Building A" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea placeholder="Describe the issue in detail..." rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="network">Network/Internet</option>
                        <option value="hardware">Hardware</option>
                        <option value="software">Software</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select required>
                        <option value="" disabled selected>Select Priority</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Submit Issue</button>
            </form>
        </div>
    </div>
</body>
</html>
