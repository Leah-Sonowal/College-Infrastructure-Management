<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Issues - Infra Flow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <h2>Infra Flow</h2>
        <div class="nav-links">
            <a href="front.html">Home</a>
            <a href="report_issue.html">Report Issue</a>
            <a href="login.html" class="btn-nav" id="logoutBtn">Logout</a>
        </div>
    </nav>
    <div class="table-container">
        <div class="table-header">
            <h2>Reported Issues</h2>
            <a href="report_issue.html" class="btn-primary" style="padding: 10px 18px; font-size: 14px;">+ New Issue</a>
        </div>
        <p id="loadingMsg" style="color: var(--text-muted); text-align:center;">Loading issues...</p>
        <p id="errorMsg" style="color: red; text-align:center; display:none;"></p>
        <table id="issuesTable" style="display:none;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Reported</th>
                </tr>
            </thead>
            <tbody id="issuesBody"></tbody>
        </table>
        <p id="emptyMsg" style="text-align:center; color:var(--text-muted); display:none;">No issues found. <a href="report_issue.html">Report one?</a></p>
    </div>

    <script>
        const API = 'http://localhost:5000';

        function statusClass(status) {
            if (!status) return '';
            const s = status.toLowerCase().replace(' ', '-');
            if (s === 'pending' || s === 'open') return 'open';
            if (s === 'in-progress' || s === 'scheduled') return 'in-progress';
            if (s === 'resolved' || s === 'closed') return 'resolved';
            return 'open';
        }

        async function loadIssues() {
            const role = localStorage.getItem('role') || 'Student';
            const userId = localStorage.getItem('user_id');

            try {
                // Faculty/Staff see all issues; Students see only their own
                let url = `${API}/issues`;
                if (role === 'Student' && userId) {
                    url = `${API}/dashboard/user/${userId}`;
                }

                const res = await fetch(url, {
                    headers: { 'role': role }
                });
                const issues = await res.json();

                document.getElementById('loadingMsg').style.display = 'none';

                if (!issues.length) {
                    document.getElementById('emptyMsg').style.display = 'block';
                    return;
                }

                const tbody = document.getElementById('issuesBody');
                tbody.innerHTML = issues.map(i => `
                    <tr>
                        <td style="font-weight:500;">#${i.issue_id}</td>
                        <td>${i.description}</td>
                        <td>${i.category || i.issue_category || '-'}</td>
                        <td>${i.building_name ? i.building_name + (i.room_no ? ' / ' + i.room_no : '') : '-'}</td>
                        <td><span class="status ${statusClass(i.status)}">${i.status}</span></td>
                        <td>${i.reported_date ? i.reported_date.substring(0, 10) : '-'}</td>
                    </tr>
                `).join('');

                document.getElementById('issuesTable').style.display = 'table';
            } catch (err) {
                document.getElementById('loadingMsg').style.display = 'none';
                const e = document.getElementById('errorMsg');
                e.textContent = 'Could not load issues. Is Flask running?';
                e.style.display = 'block';
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'login.html';
        });

        loadIssues();
    </script>
</body>
</html>
