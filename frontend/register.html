<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Infra Flow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <div class="card center-content">
            <h2>Create Account</h2>
            <p class="subtitle">Register to start reporting issues</p>
            <form id="registerForm">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="first_name" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="last_name" placeholder="Doe" required>
                </div>
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email" placeholder="name@college.edu" required>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="user_type" required>
                        <option value="" disabled selected>Select Role</option>
                        <option value="Student">Student</option>
                        <option value="Faculty">Faculty</option>
                        <option value="Staff">Staff</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <p id="errorMsg" style="color:red; font-size:13px; display:none;"></p>
                <p id="successMsg" style="color:green; font-size:13px; display:none;">Registered successfully! Redirecting...</p>
                <button type="submit" class="btn-primary" style="width:100%; margin-top:10px;">Register</button>
            </form>
            <div class="links">
                <p style="color: var(--text-muted); margin-top: 16px;">Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000';

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const payload = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                email: document.getElementById('email').value,
                date_of_birth: document.getElementById('dob').value,
                user_type: document.getElementById('user_type').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.error || 'Registration failed';
                    errorMsg.style.display = 'block';
                    return;
                }

                successMsg.style.display = 'block';
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (err) {
                errorMsg.textContent = 'Cannot connect to server. Is Flask running?';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
