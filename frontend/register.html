<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Infra Flow</title>
    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6dd5ed, #2193b0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }.container{
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }h1{
            margin-bottom: 10px;
        }p{
            color: gray;
            font-size: 14px;
            margin-bottom: 20px;
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }input, select{
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            font-family: Arial, sans-serif;
        }
        input:focus, select:focus{
            border-color: #2193b0;
        }button{
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #2193b0;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover{
            background: #17687a;
        }.links{
            margin-top: 15px;
            font-size: 13px;
        }
        .links a{
            color: #2193b0;
            text-decoration: none;
        }
        .links a:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Infra Flow</h1>
        <p>Create a new account</p>
        <form id="registerForm">
            <input type="text" id="firstNameInput" placeholder="First Name" required>
            <input type="text" id="lastNameInput" placeholder="Last Name" required>
            <input type="date" id="dobInput" required title="Date of Birth">
            <input type="email" id="emailInput" placeholder="Email address" required>
            <input type="password" id="passwordInput" placeholder="Password" required>
            <select id="roleInput" required>
                <option value="" disabled selected>Select Role</option>
                <option value="Student">Student</option>
                <option value="Faculty">Faculty</option>
                <option value="Staff">Staff</option>
                <option value="Technician">Technician</option>
                <option value="Admin">Admin</option>
            </select>
            <button type="submit">Register</button>
        </form>
        <div class="links">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const payload = {
                first_name: document.getElementById('firstNameInput').value,
                last_name: document.getElementById('lastNameInput').value,
                date_of_birth: document.getElementById('dobInput').value,
                email: document.getElementById('emailInput').value,
                password: document.getElementById('passwordInput').value,
                user_type: document.getElementById('roleInput').value
            };

            try {
                const response = await fetch('http://127.0.0.1:5000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                if (response.ok) {
                    alert('Registration successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    let errMsg = data.error || 'Registration failed';
                    if (data.details) {
                        errMsg += '\n' + data.details.join('\n');
                    }
                    alert(errMsg);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error. Is the backend running?');
            }
        });
    </script>
</body>
</html>
