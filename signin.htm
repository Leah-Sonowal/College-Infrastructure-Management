<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infra Flow Auth</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <div class="card center-content" style="max-width: 420px; padding: 32px;">
            <h2 style="font-size: 24px; color: var(--primary-color);">Infra Flow</h2>
            <p class="subtitle" style="margin-bottom: 24px;">Authentication Portal</p>
            
            <div class="tabs">
                <button id="loginTab" class="active" onclick="showLogin()">Sign in</button>
                <button id="signupTab" onclick="showSignup()">Create account</button>
            </div>

            <div class="form-group" style="margin-bottom: 24px; text-align: left;">
                <label>Select Role</label>
                <select id="role">
                    <option value="user">User Mode</option>
                    <option value="admin">Admin Mode</option>
                </select>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button class="btn-primary" style="width: 100%; margin-top: 8px;">Sign in</button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="hidden">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create a password" required>
                </div>
                <button class="btn-primary" style="width: 100%; margin-top: 8px;">Sign up</button>
            </form>
        </div>
    </div>

    <script>
    function showLogin(){
        document.getElementById("loginForm").classList.remove("hidden");
        document.getElementById("signupForm").classList.add("hidden");
        document.getElementById("loginTab").classList.add("active");
        document.getElementById("signupTab").classList.remove("active");
    }

    function showSignup(){
        document.getElementById("signupForm").classList.remove("hidden");
        document.getElementById("loginForm").classList.add("hidden");
        document.getElementById("signupTab").classList.add("active");
        document.getElementById("loginTab").classList.remove("active");
    }
    </script>
</body>
</html>
