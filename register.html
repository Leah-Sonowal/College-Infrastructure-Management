<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Infra Flow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <div class="card center-content">
            <h2>Create an account</h2>
            <p class="subtitle">Join Infra Flow to manage your tasks</p>
            <form>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="user">User</option>
                        <option value="technician">Technician</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Sign up</button>
            </form>
            <div class="links">
                <p style="color: var(--text-muted); margin-top: 16px;">Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>
</body>
</html>
