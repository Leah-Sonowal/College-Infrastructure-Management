<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Infra Flow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <div class="card center-content">
            <h2>Welcome back</h2>
            <p class="subtitle">Enter your credentials to access your account</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <p id="errorMsg" style="color:red; font-size:13px; display:none;"></p>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Sign in</button>
            </form>
            <div class="links">
                <p style="color: var(--text-muted); margin-top: 16px;">Don't have an account? <a href="register.html">Sign up</a></p>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.style.display = 'block';
                    return;
                }

                // Store session info
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('role', data.role);
                localStorage.setItem('name', data.name);

                // Route based on role
                if (data.role === 'Faculty' || data.role === 'Staff') {
                    window.location.href = 'admin_dashboard.html';
                } else {
                    window.location.href = 'view_issues.html';
                }
            } catch (err) {
                errorMsg.textContent = 'Cannot connect to server. Is Flask running?';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
