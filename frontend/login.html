<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Infra Flow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <div class="card center-content">
            <h2>Welcome back</h2>
            <p class="subtitle">Enter your credentials to access your account</p>
            <form>
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Sign in</button>
            </form>
            <div class="links">
                <p><a href="#">Forgot your password?</a></p>
                <p style="color: var(--text-muted); margin-top: 16px;">Don't have an account? <a href="register.html">Sign up</a></p>
            </div>
        </div>
    </div>
</body>
</html>
