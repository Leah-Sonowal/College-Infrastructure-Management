<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Priority - Infra Flow</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .proof-box {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-top: 8px;
            display: none;
        }
        .proof-box img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid var(--border-color);
        }
        .proof-box p {
            margin: 4px 0;
            font-size: 14px;
            color: var(--text-muted);
        }
        .proof-box strong {
            color: var(--text-main);
        }
        .no-image {
            color: var(--text-muted);
            font-style: italic;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <nav>
        <h2>Infra Flow</h2>
        <div class="nav-links">
            <a href="admin_dashboard.html">Dashboard</a>
            <a href="assign_technician.html">Assign Tasks</a>
            <a href="update_status.html">Update Status</a>
            <a href="login.html" class="btn-nav" id="logoutBtn">Logout</a>
        </div>
    </nav>

    <div class="page-container">
        <div class="card" style="max-width: 560px;">
            <h2>Assign Priority</h2>
            <p class="subtitle">Review the issue and set urgency level</p>
            <form id="priorityForm">

                <div class="form-group">
                    <label>Select Open Issue</label>
                    <select id="issue_id" required>
                        <option value="" disabled selected>Loading issues...</option>
                    </select>
                </div>

                <!-- Issue detail + proof image preview -->
                <div class="proof-box" id="proofBox">
                    <p><strong>Category:</strong> <span id="detailCategory">-</span></p>
                    <p><strong>Description:</strong> <span id="detailDesc">-</span></p>
                    <p><strong>Reported:</strong> <span id="detailDate">-</span></p>
                    <p><strong>Proof Image:</strong></p>
                    <div id="imageContainer">
                        <p class="no-image" id="noImageMsg">No image provided.</p>
                        <img id="proofImg" style="display:none;" 
                             alt="Proof of damage">
                        <a id="proofLink" href="#" target="_blank" 
                           style="display:none; font-size:13px; margin-top:6px; display:none;">
                            Open image in new tab ↗
                        </a>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 16px;">
                    <label>Priority Level</label>
                    <select id="priority" required>
                        <option value="" disabled selected>Select priority...</option>
                        <option value="Critical">🔴 Critical</option>
                        <option value="High">🟠 High</option>
                        <option value="Medium">🟡 Medium</option>
                        <option value="Low">🟢 Low</option>
                    </select>
                </div>

                <p id="errorMsg" style="color:red; font-size:13px; display:none;"></p>
                <p id="successMsg" style="color:green; font-weight:600; display:none;">
                    ✅ Priority assigned successfully!
                </p>
                <button type="submit" class="btn-primary" 
                        style="margin-top:10px; background:#111827;">
                    Save Priority
                </button>
            </form>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000';
        const role = localStorage.getItem('role') || 'Faculty';

        async function loadIssues() {
            try {
                const res = await fetch(`${API}/issues`, { headers: { role } });
                const issues = await res.json();
                const sel = document.getElementById('issue_id');
                sel.innerHTML = '<option value="" disabled selected>Choose an issue...</option>';
                issues
                    .filter(i => !['Resolved', 'Closed'].includes(i.status))
                    .forEach(i => {
                        sel.innerHTML += `<option value="${i.issue_id}" 
                            data-desc="${i.description}"
                            data-category="${i.category || ''}"
                            data-date="${i.reported_date || ''}"
                            data-image="${i.proof_image || ''}">
                            #${i.issue_id} — ${i.description.substring(0, 45)}
                        </option>`;
                    });
            } catch (err) {
                document.getElementById('issue_id').innerHTML = 
                    '<option disabled>Could not load issues</option>';
            }
        }

        // Show issue details + proof image when admin selects an issue
        document.getElementById('issue_id').addEventListener('change', function() {
            const selected = this.options[this.selectedIndex];
            const desc = selected.getAttribute('data-desc');
            const category = selected.getAttribute('data-category');
            const date = selected.getAttribute('data-date');
            const imageUrl = selected.getAttribute('data-image');

            document.getElementById('detailDesc').textContent = desc || '-';
            document.getElementById('detailCategory').textContent = category || '-';
            document.getElementById('detailDate').textContent = 
                date ? date.substring(0, 10) : '-';

            const proofImg = document.getElementById('proofImg');
            const proofLink = document.getElementById('proofLink');
            const noImageMsg = document.getElementById('noImageMsg');

            if (imageUrl && imageUrl !== 'null' && imageUrl !== '') {
                proofImg.src = imageUrl;
                proofImg.style.display = 'block';
                proofLink.href = imageUrl;
                proofLink.style.display = 'inline-block';
                noImageMsg.style.display = 'none';

                // Handle broken image URLs
                proofImg.onerror = () => {
                    proofImg.style.display = 'none';
                    proofLink.style.display = 'inline-block';
                    noImageMsg.textContent = 'Image could not load. ';
                    noImageMsg.style.display = 'block';
                };
            } else {
                proofImg.style.display = 'none';
                proofLink.style.display = 'none';
                noImageMsg.textContent = 'No image provided.';
                noImageMsg.style.display = 'block';
            }

            document.getElementById('proofBox').style.display = 'block';
        });

        document.getElementById('priorityForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Priority is stored via update-status for now
            // You can extend this to a dedicated priority column later
            const issue_id = document.getElementById('issue_id').value;
            const priority = document.getElementById('priority').value;

            try {
                const res = await fetch(`${API}/issues/update-status/${issue_id}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'role': role 
                    },
                    body: JSON.stringify({ 
                        status: 'Under Review',
                        priority: priority 
                    })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.error || 'Failed to assign priority.';
                    errorMsg.style.display = 'block';
                    return;
                }

                successMsg.style.display = 'block';
                setTimeout(() => window.location.href = 'admin_dashboard.html', 1500);
            } catch (err) {
                errorMsg.textContent = 'Cannot connect to server. Is Flask running?';
                errorMsg.style.display = 'block';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'login.html';
        });

        loadIssues();
    </script>
</body>
</html>
